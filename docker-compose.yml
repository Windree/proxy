  #     - .env
  #   volumes:
  #     - ./_/tor:/data/low-speed/
  #     - ./_/current-speed/:/data/current
  #     - ./_/status:/data/
  #   networks:
  #     - net

networks:
  net:
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET}
