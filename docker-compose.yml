services:
  tor:
    restart: unless-stopped
    build: tor/image
    env_file: .env
    volumes:
      - ./data/tor:/data
    networks:
      - network1
    healthcheck:
      test: [ "CMD", "/entrypoint.sh", "healthcheck" ]
      start_period: ${HEATHCHECK_DELAY}
      interval: 2m
      timeout: 10s
      retries: 1

  dante:
    restart: none
    build: ./dante/image
    env_file: .env
    volumes:
      - ./data/dante:/data
    ports:
      - ${PORT}:1080
    networks:
      network1:
        driver_opts:
          com.docker.network.endpoint.ifname: eth@dante

  # speedtest:
  #   restart: unless-stopped
  #   build: speedtest/image
  #   env_file: .env
  #   networks:
  #     - net

networks:
  network1:
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: ${SUBNET}
